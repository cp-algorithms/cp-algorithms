site_name: Algorithms for Competitive Programming
site_url: https://cp-algorithms.com
site_description: "The goal of this project is to translate the wonderful resource http://e-maxx.ru/algo"

docs_dir: src
site_dir: public
use_directory_urls: false

theme:
  name: material
  custom_dir: src/overrides
  palette:
    - scheme: cpalgo
      primary: deep purple
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - scheme: slate
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
  logo: favicon.ico
  favicon: favicon.ico
  features:
    - toc.integrate
    - search.suggest
    - content.code.copy

repo_url: https://github.com/cp-algorithms/cp-algorithms
repo_name: cp-algorithms/cp-algorithms

markdown_extensions:
  - pymdownx.arithmatex:
      generic: true
      tex_inline_wrap: ["$", "$"]
      tex_block_wrap: ["$$", "$$"]
  - pymdownx.highlight
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - attr_list
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - meta
  - toc:
      permalink: true

plugins:
  - search
  - macros:
      module_name: hooks
  - mkdocs-simple-hooks:
      hooks:
        on_env: "hooks:on_env"

extra_javascript:
  - https://cdnjs.cloudflare.com/polyfill/v3/polyfill.min.js?features=es6
  - https://unpkg.com/mathjax@3/es5/tex-mml-chtml.js

extra_css:
  - stylesheets/extra.css
